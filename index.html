<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Display a popup on click</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.25.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.25.0/mapbox-gl.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
</style>
</head>
<body>
<style>
    .mapboxgl-popup {
        max-width: 400px;
        font:
            12px/20px 'Helvetica Neue',
            Arial,
            Helvetica,
            sans-serif;
    }
</style>
<div id="map"></div>
<script>
    const map = new mapboxgl.Map({
        accessToken: 'pk.eyJ1IjoiYWx2YWJvc29uIiwiYSI6ImNtcWc5anJkNjA0bmkycHF1bzlybDJoengifQ.9aO57915Arw4lPaltZRGiw',
        container: 'map',
        // Choose from Mapbox's core styles, or make your own style with Mapbox Studio
        style: 'mapbox://styles/mapbox/standard',
        center: [0, 30],
        zoom: 2
    });

    map.on('load', () => {
        map.addSource('places', {
            'type': 'geojson',
            'generateId': true,
            'data': {
                'type': 'FeatureCollection',
                'features': [
                  {
                    'type': 'Feature',
                    'properties': {
                      'description':
                        '<strong>Longevity Summit Dublin</strong><p>Test popup for Join Longevity map.</p>'
                    },
                    'geometry': {
                      'type': 'Point',
                      'coordinates': [-6.2603, 53.3498]
                    }
                  },
                    {
                  'type': 'Feature',
                  'properties': {
                    'description':
                      '<strong>ARDD Copenhagen</strong><p>Moved to Boston this year.</p>'
                  },
                  'geometry': {
                    'type': 'Point',
                    'coordinates': [12.571523260574294, 55.68020985732638]
                  }
                },
                {
                  'type': 'Feature',
                  'properties': {
                    'description':
                      '<strong>ARDD Boston</strong><p>Temporarily moved here. Date: 1–3 October.</p>'
                  },
                  'geometry': {
                    'type': 'Point',
                    'coordinates': [-71.12061560859992, 42.36401527191901]
                  }
                },
                {
                  'type': 'Feature',
                  'properties': {
                    'description':
                      '<strong>Vitalist Bay</strong><p>Date will be revealed in 2027.</p>'
                  },
                  'geometry': {
                    'type': 'Point',
                    'coordinates': [-122.25948277597116, 37.86014719356995]
                  }
                },
                {
                  'type': 'Feature',
                  'properties': {
                    'description':
                      '<strong>International Longevity Summit Madrid</strong><p>30 September – 1 October.<br>Private tours on 28–29 September.<br><br><strong>Discount code:</strong> JOINLONGEVITY20</p>'
                  },
                  'geometry': {
                    'type': 'Point',
                    'coordinates': [-3.6951879351263948, 40.40965940490226]
                  }
                }
                                ]
                            }
                        });

        // Add a circle layer showing the places.
        map.addLayer({
            'id': 'places',
            'type': 'circle',
            'source': 'places',
            'paint': {
                'circle-color': '#fc00e4',
                'circle-radius': 6,
                'circle-stroke-width': 2,
                'circle-stroke-color': '#ffffff'
            }
        });

        // When a click event occurs on a feature in the places layer, open a popup at the
        // location of the feature, with description HTML from its properties.
        map.addInteraction('places-click-interaction', {
            type: 'click',
            target: { layerId: 'places' },
            handler: (e) => {
                // Copy coordinates array.
                const coordinates = e.feature.geometry.coordinates.slice();
                const description = e.feature.properties.description;

                new mapboxgl.Popup()
                    .setLngLat(coordinates)
                    .setHTML(description)
                    .addTo(map);
            }
        });

        // Change the cursor to a pointer when the mouse is over a POI.
        map.addInteraction('places-mouseenter-interaction', {
            type: 'mouseenter',
            target: { layerId: 'places' },
            handler: () => {
                map.getCanvas().style.cursor = 'pointer';
            }
        });

        // Change the cursor back to a pointer when it stops hovering over a POI.
        map.addInteraction('places-mouseleave-interaction', {
            type: 'mouseleave',
            target: { layerId: 'places' },
            handler: () => {
                map.getCanvas().style.cursor = '';
            }
        });
    });
</script>

</body>
</html>
