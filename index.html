<style>
body { margin: 0; padding: 0; }

                },
                {
                  'type': 'Feature',
                  'properties': {

                  },

                 {

                      '<strong>Longevity Investors</strong><p>Invitation only.<br>Date: September 14 - 17</p><p><a href="https://www.longevityinvestors.ch" target="_blank">Conference Website</a></p>'
                  },

                      '<strong>2060 Forum</strong><p>A two-day forum bringing together investors, founders, scientists and policymakers<br>Date: 2 - 3 September<br>Exact location to be announced</p><p><a href="https://forum.2060.life" target="_blank">🎟️ Conference Website</a></p>'

                  },

                },
                    
                {
                  'type': 'Feature',
                  'properties': {
                    'description':
                      '<strong>International Longevity Summit Madrid</strong><p>30 September – 1 October.<br>Private tours on 28–29 September.<br><br><strong>Discount code:</strong> JOINLONGEVITY20</p><p><a href="https://www.longevitysummit.madrid" target="_blank">🎟️ Conference Website</a></p>'

                  },

                  }

                                    {

                  'properties': {
                    'description':
                      '<strong>Super Human</strong><p>Date will be revealed in 2027.</p><p><a href="https://www.superhuman.net" target="_blank">🎟️ Conference Website</a></p>'
                  },
                  'geometry': {

                  }

                    {
                  'type': 'Feature',
                  'properties': {

                    'description':
                      '<strong>Swedish Longevity Cluster</strong><p>A community for people to come together to build, join or invest in longevity projects</p><p><a href="https://www.swedishlongevitycluster.se" target="_blank">Learn more</a></p>'
                  },
                  'geometry': {

                    'coordinates': [18.06614810737839, 59.334425017180116]
                  }
                },
                     {
                  'type': 'Feature',
                  'properties': {
                      'category': 'research',
                    'description':
                      '<strong>Buck Institute</strong><p>Leading aging research center.</p><p><a href="https://www.buckinstitute.org" target="_blank">Learn more</a></p>'
                  },
                  'geometry': {
                    'type': 'Point',
                    'coordinates': [-122.57370914075356, 38.13401699056643]
                  }
                },
                                ]
                            }
                        });

        // Add a circle layer showing the places.
        map.addLayer({
            'id': 'places',
            'type': 'circle',
            'source': 'places',
            'paint': {
                'circle-color': [
                  'match',
                  ['get', 'category'],
                  'research', '#3B82F6',
                  'hub', '#8B5CF6',
                  'company', '#F59E0B',
                    'event', '#DE52FF',
                  '#FF3838'
                ],
                'circle-radius': 6,
                'circle-stroke-width': 2,
                'circle-stroke-color': '#ffffff'
            }
        });

        // When a click event occurs on a feature in the places layer, open a popup at the
        // location of the feature, with description HTML from its properties.
        map.addInteraction('places-click-interaction', {
            type: 'click',
            target: { layerId: 'places' },
            handler: (e) => {
                // Copy coordinates array.
                const coordinates = e.feature.geometry.coordinates.slice();
                const description = e.feature.properties.description;

                new mapboxgl.Popup()
                    .setLngLat(coordinates)
                    .setHTML(description)
                    .addTo(map);
            }
        });

        // Change the cursor to a pointer when the mouse is over a POI.
        map.addInteraction('places-mouseenter-interaction', {
            type: 'mouseenter',
            target: { layerId: 'places' },
            handler: () => {
                map.getCanvas().style.cursor = 'pointer';
            }
        });

        // Change the cursor back to a pointer when it stops hovering over a POI.
        map.addInteraction('places-mouseleave-interaction', {
            type: 'mouseleave',
            target: { layerId: 'places' },
            handler: () => {
                map.getCanvas().style.cursor = '';
            }
        });
    });
</script>

</body>
</html>
